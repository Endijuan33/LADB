name: Create Debug Release

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)

          echo "apk=$APK" >> "$GITHUB_OUTPUT"

          SHA=$(sha256sum "$APK" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          SIZE=$(du -h "$APK" | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Read APK Information
        id: version
        uses: hkusu/apk-info-action@v1
        with:
          apk-path: ${{ steps.apk.outputs.apk }}

      - name: Generate Tag
        id: tag
        run: |
          echo "tag=v${{ steps.version.outputs.version-name }}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Delete Previous Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREFIX="v${{ steps.version.outputs.version-name }}-"

          gh api repos/${{ github.repository }}/releases \
            --paginate \
            --jq '.[] | select(.tag_name | startswith("'"$PREFIX"'")) | .tag_name' \
          | while read TAG
          do
            echo "Deleting $TAG"
            gh release delete "$TAG" --cleanup-tag --yes || true
          done

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: LADB ${{ steps.tag.outputs.tag }}

          files: |
            ${{ steps.apk.outputs.apk }}

          generate_release_notes: true
          append_body: true
          overwrite_files: true
          make_latest: true

          body: |
            ## 📦 Build Information

            | Item | Value |
            |------|-------|
            | Version | `${{ steps.version.outputs.version-name }}` |
            | Version Code | `${{ steps.version.outputs.version-code }}` |
            | Build | `${{ github.run_number }}` |
            | Branch | `${{ github.ref_name }}` |
            | Commit | `${{ github.sha }}` |
            | Commit Author | `${{ github.actor }}` |
            | APK Size | `${{ steps.apk.outputs.size }}` |
            | SHA-256 | `${{ steps.apk.outputs.sha }}` |

            ### Workflow

            - Repository: `${{ github.repository }}`
            - Workflow: `${{ github.workflow }}`
            - Run Number: `${{ github.run_number }}`
            - Run ID: `${{ github.run_id }}`

            ---
            Built automatically using GitHub Actions.

      - name: Job Summary
        run: |
          {
            echo "## 🚀 Release Published"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Version | ${{ steps.version.outputs.version-name }} |"
            echo "| Build | ${{ github.run_number }} |"
            echo "| APK Size | ${{ steps.apk.outputs.size }} |"
            echo "| SHA-256 | \`${{ steps.apk.outputs.sha }}\` |"
            echo "| Release | ${{ steps.tag.outputs.tag }} |"
          } >> "$GITHUB_STEP_SUMMARY"
