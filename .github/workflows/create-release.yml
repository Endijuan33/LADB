name: Create Debug Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)

          echo "apk=$APK" >> "$GITHUB_OUTPUT"

          SHA=$(sha256sum "$APK" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          SIZE=$(du -h "$APK" | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Read APK Info
        id: info
        uses: hkusu/apk-info-action@v1
        with:
          apk-path: ${{ steps.apk.outputs.apk }}

      - name: Delete Older Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREFIX="v${{ steps.info.outputs.version-name }}-"

          gh api repos/${{ github.repository }}/releases --paginate \
          --jq '.[] | select(.tag_name | startswith("'"$PREFIX"'")) | .tag_name' \
          | while read TAG
          do
              echo "Deleting $TAG"
              gh release delete "$TAG" --cleanup-tag -y || true
          done

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version-name }}-${{ github.run_number }}

          name: |
            LADB v${{ steps.info.outputs.version-name }}-${{ github.run_number }}

          files: |
            ${{ steps.apk.outputs.apk }}

          generate_release_notes: true

          append_body: true

          make_latest: true

          body: |
            ## 📦 Build Information

            | Item | Value |
            |------|-------|
            | Version | `${{ steps.info.outputs.version-name }}` |
            | Build | `${{ github.run_number }}` |
            | Branch | `${{ github.ref_name }}` |
            | Commit | `${{ github.sha }}` |
            | APK Size | `${{ steps.apk.outputs.size }}` |
            | SHA-256 | `${{ steps.apk.outputs.sha }}` |
            | Build Date | `${{ github.run_id }}` |

            ---
            Built automatically using GitHub Actions.

      - name: Release Summary
        run: |
          echo "## 🚀 Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.info.outputs.version-name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA256: ${{ steps.apk.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
