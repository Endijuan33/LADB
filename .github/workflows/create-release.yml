name: Create Debug Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate APK
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK_SHA256=$(sha256sum "$APK" | awk '{print $1}')" >> $GITHUB_ENV

      - name: Read APK Information
        id: apk
        uses: hkusu/apk-info-action@v1
        with:
          apk-path: ${{ env.APK_PATH }}

      - name: Generate Changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s")
          else
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s")
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "$LOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Delete old latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 | while read tag rest
          do
            if [[ "$tag" == v${{ steps.apk.outputs.version-name }}-* ]]; then
              gh release delete "$tag" --cleanup-tag -y || true
            fi
          done

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.apk.outputs.version-name }}-${{ github.run_number }}
          name: LADB v${{ steps.apk.outputs.version-name }}-${{ github.run_number }}
          files: ${{ env.APK_PATH }}
          make_latest: true
          generate_release_notes: true
          body: |
            ## 📦 Build Information

            **Version**
            `${{ steps.apk.outputs.version-name }}`

            **Build**
            `${{ github.run_number }}`

            **Commit**
            `${{ github.sha }}`

            **SHA-256**

            ```
            ${{ env.APK_SHA256 }}
            ```

            ## 📝 Changes

            ${{ steps.changelog.outputs.CHANGELOG }}
